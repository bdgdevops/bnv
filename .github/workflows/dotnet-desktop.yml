# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will build, test, sign and package a WPF or Windows Forms desktop application
# built on .NET Core.
# To learn how to migrate your existing application to .NET Core,
# refer to https://docs.microsoft.com/en-us/dotnet/desktop-wpf/migration/convert-project-from-net-framework
#
# To configure this workflow:
#
# 1. Configure environment variables
# GitHub sets default environment variables for every workflow run.
# Replace the variables relative to your project in the "env" section below.
#
# 2. Signing
# Generate a signing certificate in the Windows Application
# Packaging Project or add an existing signing certificate to the project.
# Next, use PowerShell to encode the .pfx file using Base64 encoding
# by running the following Powershell script to generate the output string:
#
# $pfx_cert = Get-Content '.\SigningCertificate.pfx' -Encoding Byte
# [System.Convert]::ToBase64String($pfx_cert) | Out-File 'SigningCertificate_Encoded.txt'
#
# Open the output file, SigningCertificate_Encoded.txt, and copy the
# string inside. Then, add the string to the repo as a GitHub secret
# and name it "Base64_Encoded_Pfx."
# For more information on how to configure your signing certificate for
# this workflow, refer to https://github.com/microsoft/github-actions-for-desktop-apps#signing
#
# Finally, add the signing certificate password to the repo as a secret and name it "Pfx_Key".
# See "Build the Windows Application Packaging project" below to see how the secret is used.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]

jobs:

  secret-scanning:
    name: 🔐 Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para escanear el historial de commits
          
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          #base: ${{ github.event.repository.default_branch }}
          #head: HEAD
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          


  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: CodeQL — Análisis Semántico Estático (SAST)
  # Detecta vulnerabilidades lógicas: inyección SQL, XSS, flujo de datos inseguro
  # Se ejecuta en paralelo con secret-scanning para mayor velocidad
  # ══════════════════════════════════════════════════════════════════════════
  codeql-analysis:
    name: 🔬 SAST - CodeQL
    runs-on: windows-latest   # requerido para analizar C# WinForms
    permissions:
      actions: read
      contents: read
      security-events: write  # necesario para subir resultados a GitHub Security

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
        queries: security-and-quality   # incluye reglas de calidad además de seguridad

    - name: Build for CodeQL
      run: dotnet build BVN.WinForms.csproj --configuration Release

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:csharp"



  build:    

    strategy: #En lugar de escribir dos trabajos separados (uno para probar el código en modo "Debug" y otro para "Release"), GitHub Actions creará dos ejecuciones en paralelo automáticamente:
              #Ejecución 1: Donde la variable configuration vale Debug.
              #Ejecución 2: Donde la variable configuration vale Release.
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on  
    needs: [secret-scanning, codeql-analysis]  # espera que los jobs de seguridad pasen

    env:
      Solution_Name: BVN.WinForms.sln                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Project_Path: BVN.WinForms.csproj
      Publish_Output: ./publish
      # Test_Project_Path: BVN.WinForms.Tests\BVN.WinForms.Tests.csproj                 # Replace with the path to your test project, i.e. MyWpfApp.Tests\MyWpfApp.Tests.csproj.
      # Wap_Project_Directory: BVN.WinForms.Package    # Replace with the Wap project directory relative to the solution, i.e. MyWpfApp.Package.
      # Wap_Project_Path: BVN.WinForms.Package\BVN.WinForms.Package.wapproj   

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # ── SCA: Análisis de Composición de Software ───────────────────────────
    # Detecta paquetes NuGet con vulnerabilidades conocidas (CVEs)
    - name: 🛡️ SCA - Check vulnerable NuGet packages
      run: |
        dotnet restore $env:Project_Path
        $output = dotnet list $env:Project_Path package --vulnerable --include-transitive 2>&1
        Write-Host $output
        if ($output -match "has the following vulnerable packages") {
          Write-Host "❌ Se encontraron paquetes NuGet con vulnerabilidades críticas. Revisa y actualiza antes de continuar."
          exit 1
        }
        Write-Host "✅ Ningún paquete vulnerable encontrado."


    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Execute all unit tests in the solution
    #- name: Execute unit tests
    #  run: dotnet test

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # Decode the base 64 encoded pfx and save the Signing_Certificate
    # Compilar y publicar como un solo .exe (self-contained)
    - name: Build & Publish (Single File)
      run: |
        dotnet publish $env:Project_Path `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          --output $env:Publish_Output

