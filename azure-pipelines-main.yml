trigger:
  branches:
    include:
    - main

pool:
  name: Default

variables:
  Project_Path: 'BVN.WinForms.csproj'
  Publish_Output: '$(Build.SourcesDirectory)/publish'
  Releases_Path: 'C:\\releases'

steps:
# 1. Instalar .NET 10
- task: UseDotNet@2
  displayName: 'Install .NET 10'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'

# 2. Instalar Velopack CLI
- powershell: |
    dotnet tool install -g vpk
  displayName: 'Install Velopack CLI'

# 3. Restaurar dependencias
- powershell: |
    dotnet restore $(Project_Path)
  displayName: 'Restore dependencies'

- task: PowerShell@2
  displayName: 'Obtener versión base del .csproj'
  inputs:
    targetType: 'inline'
    script: |
      # Busca el primer archivo .csproj en el repositorio
      $csproj = Get-ChildItem -Path . -Filter *.csproj -Recurse | Select-Object -First 1
      
      if (-not $csproj) {
          Write-Error "No se encontró ningún archivo .csproj"
          exit 1
      }
      
      Write-Host "Leyendo archivo: $($csproj.FullName)"
      $content = Get-Content $csproj.FullName -Raw
      
      # Extrae el valor dentro de la etiqueta <version> usando Regex
      if ($content -match '<version>(.*?)</version>') {
          $baseVersion = $matches[1]
          Write-Host "Versión base encontrada: $baseVersion"
      } else {
          Write-Warning "No se encontró la etiqueta <version>, usando 1.0.0 por defecto"
          $baseVersion = "1.0.0"
      }
      
      $buildId = "$(Build.BuildId)"
      $fullVersion = "$baseVersion.$buildId"
      
      # Guarda la versión base en una variable para usarla en VSBuild
      Write-Host "##vso[task.setvariable variable=baseVersion]$baseVersion"

      # Actualiza el nombre del Pipeline (Run) en la interfaz de Azure DevOps
      Write-Host "##vso[build.updatebuildnumber]$fullVersion"

# 4. Publicar la aplicación
- powershell: |
    dotnet publish $(Project_Path) `
      --configuration Release `
      --runtime win-x64 `
      --self-contained true `
      -p:PublishSingleFile=true `
      -p:Version=$(baseVersion).$(Build.BuildId) `
      --output $(Publish_Output)
  displayName: 'Build & Publish'

# 5. Empaquetar con Velopack usando el ID de compilación de Azure DevOps

- task: UseDotNet@2
  displayName: 'Install .NET 9'
  inputs:
    packageType: 'sdk'
    version: '9.0.x'
    
- powershell: |
    vpk pack `
      --packId "BVNWinForms" `
      --packVersion "$(baseVersion).$(Build.BuildId)" `
      --packDir "$(Publish_Output)" `
      --mainExe "BVN.WinForms.exe" `
      --outputDir "$(Build.SourcesDirectory)/releases"
  displayName: 'Package with Velopack'

# 6. Copiar los archivos empaquetados a la carpeta compartida en red
- powershell: |
    Copy-Item -Path "$(Build.SourcesDirectory)/releases/*" `
              -Destination "$(Releases_Path)" `
              -Recurse -Force
    Write-Host "✅ Deploy exitoso en $(Releases_Path)"
  displayName: 'Deploy releases to shared folder'
