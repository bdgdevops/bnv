trigger:
  branches:
    include:
    - main

pool:
  name: Default

variables:
  Project_Path: 'BVN.WinForms.csproj'
  Publish_Output: '$(Build.SourcesDirectory)/publish'
  Releases_Path: 'C:\\releases'

steps:
# 1. Instalar .NET 10
- task: UseDotNet@2
  displayName: 'Install .NET 10'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'

# 2. Instalar Velopack CLI
- powershell: |
    dotnet tool install -g vpk
  displayName: 'Install Velopack CLI'

# 3. Restaurar dependencias
- powershell: |
    dotnet restore $(Project_Path)
  displayName: 'Restore dependencies'

# 4. Run tests
- powershell: |
    dotnet test $(Project_Path)
  displayName: 'Run tests'

# 5. Publicar la aplicación
- powershell: |
    dotnet publish $(Project_Path) `
      --configuration Release `
      --runtime win-x64 `
      --self-contained true `
      -p:PublishSingleFile=true `
      -p:Version="1.0.$(Build.BuildId)" `
      --output $(Publish_Output)
  displayName: 'Build & Publish'

# 6. Empaquetar con Velopack usando el ID de compilación de Azure DevOps
- task: UseDotNet@2
  displayName: 'Install .NET 9'
  inputs:
    packageType: 'sdk'
    version: '9.0.x'
    
- powershell: |
    vpk pack `
      --packId "BVNWinForms" `
      --packVersion "1.0.$(Build.BuildId)" `
      --packDir "$(Publish_Output)" `
      --mainExe "BVN.WinForms.exe" `
      --outputDir "$(Build.SourcesDirectory)/releases"
  displayName: 'Package with Velopack'

# # 7. Copiar los archivos empaquetados a la carpeta compartida en red
# - powershell: |
#     Copy-Item -Path "$(Build.SourcesDirectory)/releases/*" `
#               -Destination "$(Releases_Path)" `
#               -Recurse -Force
#     Write-Host "✅ Deploy exitoso en $(Releases_Path)"
#   displayName: 'Deploy releases to shared folder'


# 7 Subir el paquete a Artifacts
- task: PublishBuildArtifacts@1
  displayName: 'Publish Velopack Package'
  inputs:
    PathtoPublish: '$(Build.SourcesDirectory)/releases'
    ArtifactName: 'drop'
    publishLocation: 'Container'